<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1020" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="34" fill="#ffffff"/>
  <rect x="0" y="0" width="960" height="540" rx="34" fill="url(#bg)"/>

  <g transform="translate(480 270)" filter="url(#shadow)">
    <circle r="170" fill="#0b1224" opacity="0.08"/>
    <circle r="150" fill="none" stroke="url(#ring)" stroke-width="18"/>
    <circle r="118" fill="#0b1224" opacity="0.06"/>
    <circle r="96" fill="none" stroke="#1f2a44" stroke-width="10" opacity="0.35"/>

    <!-- camera body -->
    <g transform="translate(-90 -30)">
      <rect x="0" y="0" width="180" height="84" rx="20" fill="#0f172a" opacity="0.85"/>
      <rect x="14" y="14" width="152" height="56" rx="16" fill="#111c33" opacity="0.95"/>
      <circle cx="132" cy="42" r="22" fill="#1e293b"/>
      <circle cx="132" cy="42" r="14" fill="#0ea5e9" opacity="0.9"/>
      <circle cx="132" cy="42" r="6" fill="#e0f2fe"/>
      <path d="M38 84h44l-18 30H20l18-30Z" fill="#0f172a" opacity="0.75"/>
    </g>

    <!-- spark lines -->
    <g stroke="#60a5fa" stroke-width="3" opacity="0.65" stroke-linecap="round">
      <path d="M-210 -40h42"/>
      <path d="M-200 -90h26"/>
      <path d="M190 -60h38"/>
      <path d="M205 -10h26"/>
    </g>
  </g>
</svg>
