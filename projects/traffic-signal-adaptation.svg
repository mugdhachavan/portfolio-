<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="arcL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="arcR" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1020" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="34" fill="#ffffff"/>
  <rect x="0" y="0" width="960" height="540" rx="34" fill="url(#glow)"/>

  <g transform="translate(480 270)" filter="url(#shadow)">
    <!-- arcs -->
    <path
      d="M-190 -10a210 210 0 0 1 140-180"
      fill="none"
      stroke="url(#arcL)"
      stroke-width="26"
      stroke-linecap="round"
    />
    <path
      d="M190 -10a210 210 0 0 0-140-180"
      fill="none"
      stroke="url(#arcR)"
      stroke-width="26"
      stroke-linecap="round"
    />

    <!-- signal pole -->
    <rect x="-18" y="-120" width="36" height="280" rx="18" fill="#0f172a" opacity="0.9"/>
    <rect x="-44" y="-170" width="88" height="190" rx="28" fill="#111c33" opacity="0.95"/>

    <!-- lights -->
    <circle cx="0" cy="-125" r="22" fill="#ef4444"/>
    <circle cx="0" cy="-75" r="22" fill="#f59e0b"/>
    <circle cx="0" cy="-25" r="22" fill="#22c55e"/>

    <!-- road hints -->
    <path d="M-220 170c70-70 140-110 220-110s150 40 220 110" fill="none" stroke="#0b1224" stroke-width="18" opacity="0.12"/>
    <path d="M0 74v120" stroke="#e2e8f0" stroke-width="8" stroke-dasharray="16 18" opacity="0.55"/>
  </g>
</svg>
