<section id="experience" class="section">
  <div class="container">
    <div class="section-head">
      <p class="kicker">Experience</p>
      <!--<h2 class="h2">Timeline that shows growth & delivery</h2>-->
      <h2 class="h2">Internships</h2>
    </div>

    <div class="timeline card">
      <div class="timeline-item" *ngFor="let item of items; let i = index">
        <div class="marker" [attr.aria-label]="iconLabel(item.icon)">
          <span class="dot" aria-hidden="true"></span>
        </div>

        <div class="content">
          <div class="top">
            <div>
              <h3 class="h3">{{ item.title }}</h3>
              <div class="meta">{{ item.org }} • {{ item.date }}</div>
            </div>
            <span class="pill">{{ iconLabel(item.icon) }}</span>
          </div>

          <ul class="points">
            <li *ngFor="let p of item.points">{{ p }}</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
