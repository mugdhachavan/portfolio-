<section id="home" class="section hero">
  <div class="container hero-grid">
    <div class="hero-left">
      <p class="eyebrow">Full Stack • Angular • AI/ML</p>

      <h1 class="hero-title">
        Hi, I’m <span class="grad">{{ name }}</span><br />
        <span class="muted">{{ role }}</span>
      </h1>

      <p class="hero-subtitle">
        I build responsive, scalable, and user-friendly web applications using Angular, Node.js, Express, MySQL — and
        modern AI/ML-based solutions.
      </p>

      <div class="chip-row" aria-label="Highlights">
        <span class="chip" *ngFor="let c of headlineChips">{{ c }}</span>
      </div>

      <div class="hero-cta">
        <a class="btn btn-primary" href="#projects">
          <span class="btn-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M4 7a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z"
                stroke-width="2"
              />
              <path d="M8 13h8" stroke-width="2" />
              <path d="M8 17h6" stroke-width="2" />
            </svg>
          </span>
          <span>View Projects</span>
        </a>

        <a class="btn btn-ghost" href="#contact">
          <span class="btn-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                d="M4 6h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"
                stroke-width="2"
              />
              <path d="m22 8-10 6L2 8" stroke-width="2" />
            </svg>
          </span>
          <span>Contact Me</span>
        </a>

        <a class="btn btn-glass" [href]="resumeUrl" target="_blank" rel="noopener">
          <span class="btn-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 3v10" stroke-width="2" />
              <path d="m7 10 5 5 5-5" stroke-width="2" />
              <path d="M5 21h14" stroke-width="2" />
            </svg>
          </span>
          <span>Download Resume</span>
        </a>
      </div>
    </div>
  </div>
</section>
