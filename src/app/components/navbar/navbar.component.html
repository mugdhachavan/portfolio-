<!-- Desktop/tablet side nav -->
<nav class="side-nav" aria-label="Section navigation">
  <div class="side-rail">
    <a
      class="side-icon"
      *ngFor="let item of navItems"
      [href]="item.href"
      [class.is-active]="activeHref === item.href"
      [attr.aria-label]="item.label"
      (click)="activeHref = item.href"
    >
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <ng-container [ngSwitch]="item.icon">
          <!-- Home -->
          <path
            *ngSwitchCase="'home'"
            d="M4 10.5l8-6.2 8 6.2V20a1.8 1.8 0 0 1-1.8 1.8H5.8A1.8 1.8 0 0 1 4 20v-9.5Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            *ngSwitchCase="'home'"
            d="M9.2 21.8v-6.4a1.2 1.2 0 0 1 1.2-1.2h3.2a1.2 1.2 0 0 1 1.2 1.2v6.4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />

          <!-- User -->
          <path
            *ngSwitchCase="'user'"
            d="M12 12.2a4.4 4.4 0 1 0-4.4-4.4 4.4 4.4 0 0 0 4.4 4.4Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <path
            *ngSwitchCase="'user'"
            d="M4.8 21.2a7.2 7.2 0 0 1 14.4 0"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />

          <!-- Grid (skills) -->
          <path
            *ngSwitchCase="'grid'"
            d="M4.8 4.8h6.2V11H4.8V4.8Zm8.2 0h6.2V11H13V4.8ZM4.8 13h6.2v6.2H4.8V13Zm8.2 0h6.2v6.2H13V13Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />

          <!-- Briefcase (projects) -->
          <path
            *ngSwitchCase="'briefcase'"
            d="M9 7.4V6.2A2.2 2.2 0 0 1 11.2 4h1.6A2.2 2.2 0 0 1 15 6.2v1.2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
          <path
            *ngSwitchCase="'briefcase'"
            d="M5.4 7.4h13.2A2.4 2.4 0 0 1 21 9.8v8.8A2.4 2.4 0 0 1 18.6 21H5.4A2.4 2.4 0 0 1 3 18.6V9.8A2.4 2.4 0 0 1 5.4 7.4Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            *ngSwitchCase="'briefcase'"
            d="M3 13.2h18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />

          <!-- Bell (experience) -->
          <path
            *ngSwitchCase="'bell'"
            d="M12 22a2.2 2.2 0 0 0 2.2-2.2H9.8A2.2 2.2 0 0 0 12 22Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
          <path
            *ngSwitchCase="'bell'"
            d="M18.6 17.6H5.4c1.2-1.2 1.6-2.4 1.6-4.4V11a5 5 0 0 1 10 0v2.2c0 2 .4 3.2 1.6 4.4Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />

          <!-- Cap (education) -->
          <path
            *ngSwitchCase="'cap'"
            d="M12 5 3.4 9.2 12 13.4l8.6-4.2L12 5Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            *ngSwitchCase="'cap'"
            d="M6.8 11.6V16c0 .8 2.4 2.4 5.2 2.4s5.2-1.6 5.2-2.4v-4.4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            *ngSwitchCase="'cap'"
            d="M20.6 10.1v5"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />

          <!-- Mail (contact) -->
          <path
            *ngSwitchCase="'mail'"
            d="M4.6 7.2h14.8A2.2 2.2 0 0 1 21.6 9.4v9.2a2.2 2.2 0 0 1-2.2 2.2H4.6a2.2 2.2 0 0 1-2.2-2.2V9.4a2.2 2.2 0 0 1 2.2-2.2Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            *ngSwitchCase="'mail'"
            d="M3.2 9.2 12 14.4l8.8-5.2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </ng-container>
      </svg>
      <span class="tip" aria-hidden="true">{{ item.label }}</span>
    </a>

    <div class="side-spacer"></div>

    <button
      class="side-icon"
      type="button"
      [attr.aria-label]="theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      (click)="toggleTheme()"
    >
      <span class="ico theme" [class.is-light]="theme === 'light'" aria-hidden="true"></span>
      <span class="tip" aria-hidden="true">Theme</span>
    </button>

    <a class="side-icon" [href]="resumeUrl" target="_blank" rel="noopener" aria-label="Download CV">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M7 3.8h7.2L18.6 8v12.6A2.4 2.4 0 0 1 16.2 23H7A2.4 2.4 0 0 1 4.6 20.6V6.2A2.4 2.4 0 0 1 7 3.8Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
        />
        <path
          d="M14.2 3.8V8h4.4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M7.8 12.4h8.4M7.8 16h8.4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </svg>
      <span class="tip" aria-hidden="true">Download CV</span>
    </a>
  </div>
</nav>

<!-- Mobile top bar -->
<header class="nav-wrap mobile-only" [class.is-scrolled]="scrolled">
  <div class="container nav">
    <a class="brand" href="#home" (click)="closeMobile()">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="brand-text">{{ name }}</span>
    </a>

    <div class="actions">
      <button
        class="icon-btn"
        type="button"
        [attr.aria-label]="theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
        (click)="toggleTheme()"
      >
        <span class="theme-icon" [class.is-light]="theme === 'light'" aria-hidden="true"></span>
      </button>

      <button
        class="icon-btn"
        type="button"
        aria-label="Open menu"
        [attr.aria-expanded]="mobileOpen"
        (click)="toggleMobile()"
      >
        <span class="hamburger" [class.is-open]="mobileOpen" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <div class="mobile-overlay" [class.is-open]="mobileOpen" (click)="closeMobile()" aria-hidden="true"></div>
  <aside class="mobile-drawer" [class.is-open]="mobileOpen" aria-label="Mobile menu">
    <div class="mobile-top">
      <div class="mobile-title">Menu</div>
      <button class="icon-btn" type="button" aria-label="Close menu" (click)="closeMobile()">
        <span class="close-x" aria-hidden="true"></span>
      </button>
    </div>

    <nav class="mobile-links">
      <a class="mobile-link" *ngFor="let item of navItems" [href]="item.href" (click)="closeMobile()">
        {{ item.label }}
      </a>
    </nav>

    <div class="mobile-cta">
      <a class="btn btn-primary w-100" href="#contact" (click)="closeMobile()">Hire Me</a>
      <a class="btn btn-ghost w-100" [href]="resumeUrl" target="_blank" rel="noopener" (click)="closeMobile()">
        Download CV
      </a>
    </div>
  </aside>
</header>
